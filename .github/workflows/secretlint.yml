name: Secretlint
on: push
permissions:
  contents: read
jobs:
  test:
    name: "Secretlint"
    runs-on: ubuntu-22.04
    container: secretlint/secretlint:v8.1.0
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lint with Secretlint
        run: secretlint "**/*"
