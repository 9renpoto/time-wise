version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "Type: Maintenance"
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "Type: Maintenance"
    groups:
      cargo:
        patterns:
          - "*"
    cooldown:
      default-days: 7
