version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "Type: Maintenance"
    groups:
      actions:
        patterns:
          - "actions/checkout"
          - "actions/github-script"
          - "actions/download-artifact"
          - "actions/setup-node"
          - "actions/stale"
      endbug:
        patterns:
          - "EndBug/export-label-config"
          - "EndBug/label-sync"
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "Type: Maintenance"
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-build"
          - "tauri-plugin-autostart"
          - "tauri-plugin-opener"
      serde:
        patterns:
          - "serde"
          - "serde_json"
          - "serde-wasm-bindgen"
      rustwasm:
        patterns:
          - "wasm-bindgen"
          - "wasm-bindgen-futures"
          - "js-sys"
          - "web-sys"
    cooldown:
      default-days: 7
