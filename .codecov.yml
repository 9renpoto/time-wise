# Codecov configuration
# For more info: https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        # 'auto' compares the coverage against the parent commit
        target: auto
        # Allow the project coverage to drop by up to 1.0% (e.g., due to dependency updates or compiler changes)
        threshold: 1.0%
